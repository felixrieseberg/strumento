name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # version.py needs commit date

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install platformio esptool

      - name: Build firmware
        run: pio run

      - name: Merge flash image into web/
        run: |
          python -m esptool --chip esp32 merge_bin \
            -o web/strumento-m5core2.bin \
            --flash_mode dio --flash_size 16MB \
            0x1000  .pio/build/m5core2/bootloader.bin \
            0x8000  .pio/build/m5core2/partitions.bin \
            0x10000 .pio/build/m5core2/firmware.bin
          ls -lh web/strumento-m5core2.bin

      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
