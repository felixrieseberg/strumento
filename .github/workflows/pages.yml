name: pages

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest release firmware
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release download --repo "$GITHUB_REPOSITORY" \
               --pattern 'strumento-m5core2.bin' --dir web; then
            echo "Bundled $(ls -l web/strumento-m5core2.bin)"
          else
            echo "::warning::No release asset yet — installer page will deploy without firmware."
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
